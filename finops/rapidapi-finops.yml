meters:
  - name: enterprise_subscription
    description: Annual contract fee for RapidAPI Enterprise Hub
    unit: contract
    aggregation: sum
principles:
  - name: Visibility
    description: Until a contract is signed, no usage telemetry is exposed; once provisioned,
      Enterprise Hub admins can pull traffic analytics from the in-product dashboard.
  - name: Allocation
    description: Allocate by API key and consumer team within the Enterprise Hub admin console.
  - name: Optimization
    description: Negotiate volume tiers, on-prem vs SaaS, and hub consolidation at renewal; no
      public discount schedule.
  - name: Accountability
    description: Procurement and platform team co-own the Enterprise Hub contract; cost is fixed
      annual rather than usage-driven.
