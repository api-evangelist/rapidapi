description: FOCUS-aligned FinOps shape for RapidAPI Enterprise Hub. Commercial terms are negotiated;
  no public price list, so meters and unit economics below are placeholders to be confirmed at
  contract time.
sources:
  - https://rapidapi.com/products/enterprise-hub
notes: RapidAPI Enterprise Hub is contact-sales; no usage/billing API is publicly documented for
  reconciliation, so meter list is intentionally minimal and FOCUS columns reflect the assumed
  enterprise contract structure rather than a fetched billing surface.
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
