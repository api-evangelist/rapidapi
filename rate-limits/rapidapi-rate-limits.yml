specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: RapidAPI
providerId: rapidapi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Marketplace
  - API Management
  - Enterprise
  - Rate Limiting
description: RapidAPI does not publish a single platform-wide rate limit. Each API on the marketplace
  has its own per-listing quota and burst settings configured by its publisher; Enterprise Hub
  customers configure gateway throttling per their own deployment. Limits below are gated and
  resolved at contract or per-listing level rather than via a public docs page.
sources:
  - https://rapidapi.com/products/enterprise-hub
notes: Public rate-limit documentation is not available; throttling parameters are set per-listing
  by API publishers or per-deployment by Enterprise Hub administrators.
responseCodes:
  throttled: 429
limits:
  - name: Per-listing quota
    scope: api-key
    metric: varies
    limit: 'set per-listing by API publisher; see each API page on rapidapi.com'
  - name: Enterprise Hub deployment throttling
    scope: contract
    metric: varies
    limit: 'configured per-deployment by Enterprise Hub administrator'
policies:
  - name: Per-listing Configuration
    description: On the public marketplace each API publisher sets their own quotas, burst, and
      overage behavior; consumers see those values on the API's pricing tab on rapidapi.com.
  - name: Enterprise Self-service
    description: Enterprise Hub customers control gateway throttling and quota tiers via their
      own admin console; there is no shared platform-wide limit to publish.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
