naftiko: 1.0.0-alpha2
info:
  label: RapidAPI Studio API — Requests
  description: 'RapidAPI Studio API — Requests. 1 operations. Lead operation: List saved requests. Self-contained Naftiko
    capability covering one Rapidapi business surface.'
  tags:
  - Rapidapi
  - Requests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDAPI_API_KEY: RAPIDAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: studio-requests
    baseUri: https://studio.rapidapi.com/v1
    description: RapidAPI Studio API — Requests business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-requests
      path: /projects/{projectId}/requests
      operations:
      - name: listrequests
        method: GET
        description: List saved requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: studio-requests-rest
    port: 8080
    description: REST adapter for RapidAPI Studio API — Requests. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/requests
      name: projects-projectid-requests
      description: REST surface for projects-projectId-requests.
      operations:
      - method: GET
        name: listrequests
        description: List saved requests
        call: studio-requests.listrequests
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: studio-requests-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapidAPI Studio API — Requests. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-saved-requests
      description: List saved requests
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: studio-requests.listrequests
      outputParameters:
      - type: object
        mapping: $.
