naftiko: 1.0.0-alpha2
info:
  label: RapidAPI Hub API — Categories
  description: 'RapidAPI Hub API — Categories. 2 operations. Lead operation: List marketplace categories. Self-contained Naftiko
    capability covering one Rapidapi business surface.'
  tags:
  - Rapidapi
  - Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDAPI_API_KEY: RAPIDAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: hub-categories
    baseUri: https://rapidapi.com
    description: RapidAPI Hub API — Categories business capability. Self-contained, no shared references.
    resources:
    - name: categories
      path: /categories
      operations:
      - name: listhubcategories
        method: GET
        description: List marketplace categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: categories-categorySlug-apis
      path: /categories/{categorySlug}/apis
      operations:
      - name: listapisbycategory
        method: GET
        description: List APIs in a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: categorySlug
          in: path
          type: string
          description: The URL-friendly slug of the category
          required: true
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: hub-categories-rest
    port: 8080
    description: REST adapter for RapidAPI Hub API — Categories. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/categories
      name: categories
      description: REST surface for categories.
      operations:
      - method: GET
        name: listhubcategories
        description: List marketplace categories
        call: hub-categories.listhubcategories
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/categories/{categoryslug}/apis
      name: categories-categoryslug-apis
      description: REST surface for categories-categorySlug-apis.
      operations:
      - method: GET
        name: listapisbycategory
        description: List APIs in a category
        call: hub-categories.listapisbycategory
        with:
          categorySlug: rest.categorySlug
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hub-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapidAPI Hub API — Categories. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-marketplace-categories
      description: List marketplace categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hub-categories.listhubcategories
      outputParameters:
      - type: object
        mapping: $.
    - name: list-apis-category
      description: List APIs in a category
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hub-categories.listapisbycategory
      with:
        categorySlug: tools.categorySlug
      outputParameters:
      - type: object
        mapping: $.
