naftiko: 1.0.0-alpha2
info:
  label: RapidAPI Testing API — Alerts
  description: 'RapidAPI Testing API — Alerts. 3 operations. Lead operation: List alert configurations. Self-contained Naftiko
    capability covering one Rapidapi business surface.'
  tags:
  - Rapidapi
  - Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDAPI_API_KEY: RAPIDAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: testing-alerts
    baseUri: https://testing.rapidapi.com/v1
    description: RapidAPI Testing API — Alerts business capability. Self-contained, no shared references.
    resources:
    - name: alerts
      path: /alerts
      operations:
      - name: listalerts
        method: GET
        description: List alert configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createalert
        method: POST
        description: Create an alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: alerts-alertId
      path: /alerts/{alertId}
      operations:
      - name: deletealert
        method: DELETE
        description: Delete an alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: testing-alerts-rest
    port: 8080
    description: REST adapter for RapidAPI Testing API — Alerts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/alerts
      name: alerts
      description: REST surface for alerts.
      operations:
      - method: GET
        name: listalerts
        description: List alert configurations
        call: testing-alerts.listalerts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createalert
        description: Create an alert
        call: testing-alerts.createalert
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alerts/{alertid}
      name: alerts-alertid
      description: REST surface for alerts-alertId.
      operations:
      - method: DELETE
        name: deletealert
        description: Delete an alert
        call: testing-alerts.deletealert
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: testing-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapidAPI Testing API — Alerts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-alert-configurations
      description: List alert configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: testing-alerts.listalerts
      outputParameters:
      - type: object
        mapping: $.
    - name: create-alert
      description: Create an alert
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: testing-alerts.createalert
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-alert
      description: Delete an alert
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: testing-alerts.deletealert
      outputParameters:
      - type: object
        mapping: $.
