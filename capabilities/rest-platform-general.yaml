naftiko: 1.0.0-alpha2
info:
  label: RapidAPI REST Platform API
  description: 'RapidAPI REST Platform API. 10 operations. Lead operation: List all APIs. Self-contained Naftiko capability
    covering one Rapidapi business surface.'
  tags:
  - Rapidapi
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDAPI_API_KEY: RAPIDAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-platform-general
    baseUri: https://platform.rapidapi.com/v1
    description: RapidAPI REST Platform API business capability. Self-contained, no shared references.
    resources:
    - name: apis
      path: /apis
      operations:
      - name: listapis
        method: GET
        description: List all APIs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapi
        method: POST
        description: Create an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: apis-apiId
      path: /apis/{apiId}
      operations:
      - name: getapi
        method: GET
        description: Get an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapi
        method: PUT
        description: Update an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapi
        method: DELETE
        description: Delete an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apis-apiId-versions
      path: /apis/{apiId}/versions
      operations:
      - name: listapiversions
        method: GET
        description: List API versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apis-apiId-versions-versionId
      path: /apis/{apiId}/versions/{versionId}
      operations:
      - name: updateapiversion
        method: PUT
        description: Update an API version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tags
      path: /tags
      operations:
      - name: listtags
        method: GET
        description: List all tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtag
        method: POST
        description: Create a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tags-tagId
      path: /tags/{tagId}
      operations:
      - name: deletetag
        method: DELETE
        description: Delete a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rest-platform-general-rest
    port: 8080
    description: REST adapter for RapidAPI REST Platform API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/apis
      name: apis
      description: REST surface for apis.
      operations:
      - method: GET
        name: listapis
        description: List all APIs
        call: rest-platform-general.listapis
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapi
        description: Create an API
        call: rest-platform-general.createapi
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apis/{apiid}
      name: apis-apiid
      description: REST surface for apis-apiId.
      operations:
      - method: GET
        name: getapi
        description: Get an API
        call: rest-platform-general.getapi
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapi
        description: Update an API
        call: rest-platform-general.updateapi
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapi
        description: Delete an API
        call: rest-platform-general.deleteapi
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apis/{apiid}/versions
      name: apis-apiid-versions
      description: REST surface for apis-apiId-versions.
      operations:
      - method: GET
        name: listapiversions
        description: List API versions
        call: rest-platform-general.listapiversions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apis/{apiid}/versions/{versionid}
      name: apis-apiid-versions-versionid
      description: REST surface for apis-apiId-versions-versionId.
      operations:
      - method: PUT
        name: updateapiversion
        description: Update an API version
        call: rest-platform-general.updateapiversion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags
      name: tags
      description: REST surface for tags.
      operations:
      - method: GET
        name: listtags
        description: List all tags
        call: rest-platform-general.listtags
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtag
        description: Create a tag
        call: rest-platform-general.createtag
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags/{tagid}
      name: tags-tagid
      description: REST surface for tags-tagId.
      operations:
      - method: DELETE
        name: deletetag
        description: Delete a tag
        call: rest-platform-general.deletetag
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-platform-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapidAPI REST Platform API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-apis
      description: List all APIs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-platform-general.listapis
      outputParameters:
      - type: object
        mapping: $.
    - name: create-api
      description: Create an API
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-platform-general.createapi
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-api
      description: Get an API
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-platform-general.getapi
      outputParameters:
      - type: object
        mapping: $.
    - name: update-api
      description: Update an API
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-platform-general.updateapi
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-api
      description: Delete an API
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-platform-general.deleteapi
      outputParameters:
      - type: object
        mapping: $.
    - name: list-api-versions
      description: List API versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-platform-general.listapiversions
      outputParameters:
      - type: object
        mapping: $.
    - name: update-api-version
      description: Update an API version
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-platform-general.updateapiversion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-all-tags
      description: List all tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-platform-general.listtags
      outputParameters:
      - type: object
        mapping: $.
    - name: create-tag
      description: Create a tag
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-platform-general.createtag
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-tag
      description: Delete a tag
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-platform-general.deletetag
      outputParameters:
      - type: object
        mapping: $.
