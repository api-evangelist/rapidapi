      name: projects-projectid-endpoints
      description: REST surface for projects-projectId-endpoints.
      operations:
      - method: GET
        name: listendpoints
        description: List endpoints
        call: studio-endpoints.listendpoints
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createendpoint
        description: Create an endpoint
