naftiko: 1.0.0-alpha2
info:
  label: RapidAPI Testing API — Executions
  description: 'RapidAPI Testing API — Executions. 2 operations. Lead operation: List test executions. Self-contained Naftiko
    capability covering one Rapidapi business surface.'
  tags:
  - Rapidapi
  - Executions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDAPI_API_KEY: RAPIDAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: testing-executions
    baseUri: https://testing.rapidapi.com/v1
    description: RapidAPI Testing API — Executions business capability. Self-contained, no shared references.
    resources:
    - name: executions
      path: /executions
      operations:
      - name: listexecutions
        method: GET
        description: List test executions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: testId
          in: query
          type: string
          description: Filter executions by test identifier
        - name: status
          in: query
          type: string
          description: Filter executions by result status
    - name: executions-executionId
      path: /executions/{executionId}
      operations:
      - name: getexecution
        method: GET
        description: Get execution details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: testing-executions-rest
    port: 8080
    description: REST adapter for RapidAPI Testing API — Executions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/executions
      name: executions
      description: REST surface for executions.
      operations:
      - method: GET
        name: listexecutions
        description: List test executions
        call: testing-executions.listexecutions
        with:
          testId: rest.testId
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/executions/{executionid}
      name: executions-executionid
      description: REST surface for executions-executionId.
      operations:
      - method: GET
        name: getexecution
        description: Get execution details
        call: testing-executions.getexecution
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: testing-executions-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapidAPI Testing API — Executions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-test-executions
      description: List test executions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: testing-executions.listexecutions
      with:
        testId: tools.testId
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: get-execution-details
      description: Get execution details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: testing-executions.getexecution
      outputParameters:
      - type: object
        mapping: $.
