naftiko: 1.0.0-alpha2
info:
  label: RapidAPI REST Platform API — Categories
  description: 'RapidAPI REST Platform API — Categories. 4 operations. Lead operation: List all categories. Self-contained
    Naftiko capability covering one Rapidapi business surface.'
  tags:
  - Rapidapi
  - Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDAPI_API_KEY: RAPIDAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-platform-categories
    baseUri: https://platform.rapidapi.com/v1
    description: RapidAPI REST Platform API — Categories business capability. Self-contained, no shared references.
    resources:
    - name: categories
      path: /categories
      operations:
      - name: listcategories
        method: GET
        description: List all categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcategory
        method: POST
        description: Create a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: categories-categoryId
      path: /categories/{categoryId}
      operations:
      - name: updatecategory
        method: PUT
        description: Update a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecategory
        method: DELETE
        description: Delete a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rest-platform-categories-rest
    port: 8080
    description: REST adapter for RapidAPI REST Platform API — Categories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/categories
      name: categories
      description: REST surface for categories.
      operations:
      - method: GET
        name: listcategories
        description: List all categories
        call: rest-platform-categories.listcategories
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcategory
        description: Create a category
        call: rest-platform-categories.createcategory
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/categories/{categoryid}
      name: categories-categoryid
      description: REST surface for categories-categoryId.
      operations:
      - method: PUT
        name: updatecategory
        description: Update a category
        call: rest-platform-categories.updatecategory
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecategory
        description: Delete a category
        call: rest-platform-categories.deletecategory
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-platform-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapidAPI REST Platform API — Categories. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-categories
      description: List all categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-platform-categories.listcategories
      outputParameters:
      - type: object
        mapping: $.
    - name: create-category
      description: Create a category
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-platform-categories.createcategory
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-category
      description: Update a category
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-platform-categories.updatecategory
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-category
      description: Delete a category
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-platform-categories.deletecategory
      outputParameters:
      - type: object
        mapping: $.
