    port: 9090
    transport: http
    description: MCP adapter for RapidAPI Gateway API — Routes. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-routes
      description: List routes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-routes.listroutes
      outputParameters:
      - type: object
        mapping: $.
    - name: create-route
      description: Create a route
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gateway-routes.createroute
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-route
