  - type: http
    namespace: gateway-routes
    baseUri: https://gateway.rapidapi.com/v1
    description: RapidAPI Gateway API — Routes business capability. Self-contained, no shared references.
    resources:
    - name: gateways-gatewayId-routes
      path: /gateways/{gatewayId}/routes
      operations:
      - name: listroutes
        method: GET
        description: List routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createroute
        method: POST
        description: Create a route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: gateways-gatewayId-routes-routeId
      path: /gateways/{gatewayId}/routes/{routeId}
      operations:
      - name: updateroute
        method: PUT
        description: Update a route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteroute
        method: DELETE
        description: Delete a route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: gateway-routes-rest
    port: 8080
    description: REST adapter for RapidAPI Gateway API — Routes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gateways/{gatewayid}/routes
      name: gateways-gatewayid-routes
      description: REST surface for gateways-gatewayId-routes.
      operations:
      - method: GET
        name: listroutes
        description: List routes
        call: gateway-routes.listroutes
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createroute
        description: Create a route
        call: gateway-routes.createroute
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gateways/{gatewayid}/routes/{routeid}
      name: gateways-gatewayid-routes-routeid
      description: REST surface for gateways-gatewayId-routes-routeId.
      operations:
      - method: PUT
        name: updateroute
        description: Update a route
        call: gateway-routes.updateroute
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
