naftiko: 1.0.0-alpha2
info:
  label: RapidAPI REST Platform API — Subscriptions
  description: 'RapidAPI REST Platform API — Subscriptions. 1 operations. Lead operation: List all subscriptions. Self-contained
    Naftiko capability covering one Rapidapi business surface.'
  tags:
  - Rapidapi
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDAPI_API_KEY: RAPIDAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-platform-subscriptions
    baseUri: https://platform.rapidapi.com/v1
    description: RapidAPI REST Platform API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: subscriptions
      path: /subscriptions
      operations:
      - name: listsubscriptions
        method: GET
        description: List all subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rest-platform-subscriptions-rest
    port: 8080
    description: REST adapter for RapidAPI REST Platform API — Subscriptions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/subscriptions
      name: subscriptions
      description: REST surface for subscriptions.
      operations:
      - method: GET
        name: listsubscriptions
        description: List all subscriptions
        call: rest-platform-subscriptions.listsubscriptions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-platform-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapidAPI REST Platform API — Subscriptions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-all-subscriptions
      description: List all subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-platform-subscriptions.listsubscriptions
      outputParameters:
      - type: object
        mapping: $.
