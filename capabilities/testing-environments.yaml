naftiko: 1.0.0-alpha2
info:
  label: RapidAPI Testing API — Environments
  description: 'RapidAPI Testing API — Environments. 4 operations. Lead operation: List environments. Self-contained Naftiko
    capability covering one Rapidapi business surface.'
  tags:
  - Rapidapi
  - Environments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAPIDAPI_API_KEY: RAPIDAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: testing-environments
    baseUri: https://testing.rapidapi.com/v1
    description: RapidAPI Testing API — Environments business capability. Self-contained, no shared references.
    resources:
    - name: environments
      path: /environments
      operations:
      - name: listenvironments
        method: GET
        description: List environments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createenvironment
        method: POST
        description: Create an environment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: environments-environmentId
      path: /environments/{environmentId}
      operations:
      - name: updateenvironment
        method: PUT
        description: Update an environment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteenvironment
        method: DELETE
        description: Delete an environment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.RAPIDAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: testing-environments-rest
    port: 8080
    description: REST adapter for RapidAPI Testing API — Environments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/environments
      name: environments
      description: REST surface for environments.
      operations:
      - method: GET
        name: listenvironments
        description: List environments
        call: testing-environments.listenvironments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createenvironment
        description: Create an environment
        call: testing-environments.createenvironment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environments/{environmentid}
      name: environments-environmentid
      description: REST surface for environments-environmentId.
      operations:
      - method: PUT
        name: updateenvironment
        description: Update an environment
        call: testing-environments.updateenvironment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteenvironment
        description: Delete an environment
        call: testing-environments.deleteenvironment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: testing-environments-mcp
    port: 9090
    transport: http
    description: MCP adapter for RapidAPI Testing API — Environments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-environments
      description: List environments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: testing-environments.listenvironments
      outputParameters:
      - type: object
        mapping: $.
    - name: create-environment
      description: Create an environment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: testing-environments.createenvironment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-environment
      description: Update an environment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: testing-environments.updateenvironment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-environment
      description: Delete an environment
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: testing-environments.deleteenvironment
      outputParameters:
      - type: object
        mapping: $.
