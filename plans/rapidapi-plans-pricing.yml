specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: RapidAPI
providerId: rapidapi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Marketplace
  - API Management
  - Enterprise
  - API Gateway
description: RapidAPI (Enterprise Hub) is a B2B platform sold via direct sales engagement. The
  public rapidapi.com surface is an API marketplace where pricing for individual third-party APIs
  is set per-listing by API publishers, not by RapidAPI itself. There is no published RapidAPI
  platform tier list. Plan terms are negotiated with sales for the Enterprise Hub product.
sources:
  - https://rapidapi.com/products/enterprise-hub
notes: Pricing page returns no public tier information; RapidAPI Enterprise Hub is sold contact-sales
  only. Per-API pricing on the marketplace is set by individual API publishers and is out of scope
  for this artifact.
plans:
  - id: rapidapi-contact-sales
    name: Contact Sales
    type: enterprise
    description: All RapidAPI Enterprise Hub commercial terms (capacity, support, on-prem vs SaaS,
      private hub) are negotiated directly with RapidAPI sales. No public price list.
    entries:
      - label: Custom contract
        name: custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Private API Hub
      - name: SSO and RBAC
      - name: Self-hosted or RapidAPI-hosted deployment
      - name: Dedicated technical account management
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
